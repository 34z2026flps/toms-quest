<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tom's Quest — Teacher Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f0f4ff;color:#1a1a2e;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:16px 20px;color:#fff;}
.hdr h1{font-size:18px;font-weight:900;}
.hdr p{font-size:12px;opacity:.8;margin-top:2px;}
.wrap{max-width:700px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1.5px solid #e5e7eb;}
.card-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;margin-bottom:12px;}
.btn{padding:9px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;}
.btn-p{background:#4f46e5;color:#fff;}
.btn-r{background:#fee2e2;color:#dc2626;}
.btn-g{background:#f3f4f6;color:#6b7280;}
.btn-sm{padding:6px 12px;font-size:12px;}
.day-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.day-tab{padding:7px 14px;border-radius:9px;border:2px solid #e5e7eb;background:#fff;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;color:#6b7280;}
.day-tab.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.task-row{border:1.5px solid #e5e7eb;border-radius:11px;padding:13px;margin-bottom:10px;}
.field-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:7px;}
.field-label{font-size:11px;font-weight:700;color:#6b7280;min-width:72px;padding-top:8px;}
.field-input{flex:1;padding:7px 10px;border-radius:9px;border:1.5px solid #e5e7eb;font-family:inherit;font-size:12px;font-weight:600;color:#1a1a2e;outline:none;}
.field-input:focus{border-color:#4f46e5;}
textarea.field-input{resize:vertical;min-height:70px;line-height:1.5;}
.num-input{width:65px;text-align:center;font-weight:700;}
.task-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.subj-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:7px;background:#eef2ff;color:#4f46e5;}
.del-btn{margin-left:auto;background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:4px 10px;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;}
.mood-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;}
.writing-box{background:#f8fafc;border-radius:9px;padding:10px 12px;margin-bottom:8px;border:1px solid #e5e7eb;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#22c55e;}
.dot-err{background:#ef4444;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a2e;color:#fff;padding:9px 20px;border-radius:26px;font-size:13px;font-weight:700;z-index:300;transition:transform .3s;}
.toast.show{transform:translateX(-50%) translateY(0);}
.add-row{background:#f5f3ff;border-radius:11px;border:2px dashed #c7d2fe;padding:10px;margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
select.field-input{background:#fff;}
#loading{display:flex;position:fixed;inset:0;background:#f0f4ff;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999;}
#pin-wrap{display:none;position:fixed;inset:0;background:#f0f4ff;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:998;}
#main-wrap{display:none;}
.pin-input{font-size:28px;font-weight:900;letter-spacing:8px;text-align:center;width:160px;padding:12px;border-radius:12px;border:2.5px solid #e5e7eb;font-family:inherit;outline:none;}
.pin-input:focus{border-color:#4f46e5;}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div style="font-size:40px">⚙️</div>
  <div style="font-size:16px;font-weight:800;color:#4f46e5">Connecting to database…</div>
  <div id="load-err" style="font-size:13px;color:#dc2626;font-weight:700;max-width:300px;text-align:center;display:none"></div>
</div>

<!-- PIN screen -->
<div id="pin-wrap" style="display:none">
  <div style="text-align:center">
    <div style="font-size:40px;margin-bottom:10px">🔒</div>
    <h2 style="font-size:20px;font-weight:900;margin-bottom:6px">Teacher Admin</h2>
    <p style="font-size:13px;color:#6b7280;font-weight:600;margin-bottom:16px">Enter your PIN</p>
    <input id="pin-input" type="password" maxlength="4" class="pin-input" placeholder="••••"
      oninput="if(this.value.length===4)checkPin()">
    <div id="pin-err" style="color:#dc2626;font-size:12px;font-weight:700;min-height:18px;margin-top:8px"></div>
  </div>
</div>

<!-- Main admin -->
<div id="main-wrap" style="display:none">
  <div class="hdr">
    <h1>⚙️ Tom's Quest — Teacher Admin</h1>
    <p>Changes sync to Tom's screen within 10 seconds</p>
  </div>
  <div class="wrap">

    <!-- Status -->
    <div class="card" style="display:flex;align-items:center;gap:10px">
      <div class="status-dot dot-ok" id="status-dot"></div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800" id="status-text">Connected</div>
        <div style="font-size:11px;color:#6b7280;font-weight:600" id="status-sub">Supabase real-time</div>
      </div>
      <button class="btn btn-g btn-sm" onclick="loadAll()">🔄 Refresh</button>
    </div>

    <!-- XP -->
    <div class="card">
      <div class="card-title">Tom's XP</div>
      <div class="field-row">
        <div class="field-label">XP total</div>
        <input class="field-input num-input" type="number" id="xp-input" min="0" max="9999" value="0">
        <button class="btn btn-p btn-sm" onclick="saveXP()">Save XP</button>
      </div>
    </div>

    <!-- Tasks -->
    <div class="card">
      <div class="card-title">📋 Tasks</div>
      <div class="day-tabs" id="day-tabs"></div>
      <div id="tasks-area" style="color:#9ca3af;font-size:13px;font-weight:600;padding:8px 0">Loading…</div>
      <div class="add-row">
        <select id="new-subj" class="field-input" style="max-width:130px;flex-shrink:0">
          <option>Reading</option><option>Maths</option><option>Writing</option>
          <option>Spelling</option><option>Video</option><option>Science</option>
          <option>History</option><option>Geography</option><option>Worksheet</option>
          <option>Slides</option><option>Other</option>
        </select>
        <input id="new-name" class="field-input" placeholder="Task name…" style="flex:1;min-width:100px"
          onkeydown="if(event.key==='Enter')addTask()">
        <button class="btn btn-p btn-sm" onclick="addTask()">Add ✓</button>
      </div>
      <div style="margin-top:8px">
        <button class="btn btn-r btn-sm" onclick="resetDay()">🔄 Reset day progress</button>
      </div>
    </div>

    <!-- Mood log -->
    <div class="card">
      <div class="card-title">💭 Mood log — today</div>
      <div id="mood-area" style="color:#9ca3af;font-size:13px;font-weight:600">Loading…</div>
    </div>

    <!-- Writing -->
    <div class="card">
      <div class="card-title">✏️ Tom's submitted writing</div>
      <div id="writing-area" style="color:#9ca3af;font-size:13px;font-weight:600">Loading…</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PIN = '2026';
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const SUBJS = ['Reading','Maths','Writing','Spelling','Video','Science','History','Geography','Worksheet','Slides','Other'];
const XP_DEF = {Reading:30,Maths:25,Writing:35,Spelling:25,Video:20,Science:25,History:25,Geography:25,Worksheet:30,Slides:20,Other:20};
const META_DEF = {Reading:'15 min read',Maths:'10 questions',Writing:'5 sentences',Spelling:'8 words',Video:'Watch & answer',Science:'10 questions',History:'10 questions',Geography:'10 questions',Worksheet:'Complete worksheet',Slides:'View slides',Other:'Complete task'};

let db = null;
let day = 0;
let tasks = [];

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', async function() {
  try {
    // Wait for Supabase CDN library
    let tries = 0;
    while (tries < 50) {
      if (window.supabase && window.supabase.createClient) break;
      await sleep(100);
      tries++;
    }
    if (!window.supabase || !window.supabase.createClient) throw new Error('Supabase library failed to load — check internet connection');

    db = window.supabase.createClient(
      'https://qfjwwoxmnatfagqjkgpv.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmand3b3htbmF0ZmFncWprZ3B2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzcyNTgsImV4cCI6MjA4OTgxMzI1OH0.4pGQPBwk9Off59LHHcPKzrSSDwINJcTv0EpGkbjH5Hc'
    );

    // Test connection
    const { error } = await db.from('quest_state').select('id').limit(1);
    if (error) throw new Error(error.message);

    // Connected — show PIN screen
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pin-wrap').style.display = 'flex';
    document.getElementById('pin-input').focus();

  } catch(e) {
    document.getElementById('load-err').textContent = 'Error: ' + e.message;
    document.getElementById('load-err').style.display = 'block';
    document.querySelector('#loading div:nth-child(2)').textContent = 'Could not connect';
  }
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── PIN ──────────────────────────────────────────────────
function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === PIN) {
    document.getElementById('pin-wrap').style.display = 'none';
    document.getElementById('main-wrap').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('pin-err').textContent = 'Wrong PIN';
    document.getElementById('pin-input').value = '';
    setTimeout(() => document.getElementById('pin-err').textContent = '', 1500);
  }
}

// ── LOAD DATA ─────────────────────────────────────────────
async function loadAll() {
  try {
    await Promise.all([loadState(), loadTasks(), loadMoods()]);
    setStatus(true, 'Connected', 'Last refreshed: ' + new Date().toLocaleTimeString());
  } catch(e) {
    setStatus(false, 'Error loading data', e.message);
  }
}

async function loadState() {
  const { data } = await db.from('quest_state').select('*').eq('id','tom').single();
  if (data) document.getElementById('xp-input').value = data.xp || 0;
}

async function loadTasks() {
  const { data, error } = await db.from('tasks').select('*').eq('student_id','tom').order('id');
  if (error) throw error;
  tasks = data || [];
  renderDayTabs();
  renderTasks();
  renderWriting();
}

async function loadMoods() {
  const today = new Date().toISOString().split('T')[0];
  const { data } = await db.from('mood_log').select('*').eq('student_id','tom').gte('logged_at', today).order('logged_at');
  renderMoods(data || []);
}

// ── RENDER ────────────────────────────────────────────────
function renderDayTabs() {
  const c = document.getElementById('day-tabs');
  c.innerHTML = '';
  DAYS.forEach((d, i) => {
    const b = document.createElement('button');
    b.className = 'day-tab' + (i === day ? ' active' : '');
    b.textContent = d;
    b.onclick = () => { flushFields(); day = i; renderDayTabs(); renderTasks(); };
    c.appendChild(b);
  });
}

function renderTasks() {
  const c = document.getElementById('tasks-area');
  const dayTasks = tasks.filter(t => t.day_index === day);
  if (!dayTasks.length) {
    c.innerHTML = '<div style="color:#9ca3af;font-size:13px;font-weight:600;padding:8px 0">No tasks for this day. Add one below.</div>';
    return;
  }
  c.innerHTML = '';
  dayTasks.forEach(t => {
    const pct = t.steps > 0 ? Math.round((t.progress / t.steps) * 100) : 0;
    const div = document.createElement('div');
    div.className = 'task-row';
    div.innerHTML = `
      <div class="task-header">
        <span class="subj-badge">${t.subject}</span>
        <span style="font-size:12px;font-weight:700;color:#6b7280">${pct}% done ${t.done?'✓':''}</span>
        <button class="del-btn" onclick="delTask(${t.id})">✕ Delete</button>
      </div>
      <div class="field-row"><div class="field-label">Title</div><input class="field-input" id="an-${t.id}" value="${esc(t.name)}"></div>
      <div class="field-row"><div class="field-label">Details</div><input class="field-input" id="am-${t.id}" value="${esc(t.meta)}"></div>
      <div class="field-row">
        <div class="field-label">Subject</div>
        <select class="field-input" id="as-${t.id}" style="max-width:130px">
          ${SUBJS.map(s=>`<option value="${s}"${s===t.subject?' selected':''}>${s}</option>`).join('')}
        </select>
        <input class="field-input num-input" type="number" id="ax-${t.id}" value="${t.xp}" min="5" max="200" title="XP">
        <input class="field-input num-input" type="number" id="ast-${t.id}" value="${t.steps}" min="1" max="20" title="Steps">
      </div>
      <div class="field-row"><div class="field-label">Link/URL</div><input class="field-input" id="al-${t.id}" value="${esc(t.link||'')}" placeholder="YouTube / Slides URL…"></div>
      <div class="field-row" style="align-items:flex-start">
        <div class="field-label">Content</div>
        <textarea class="field-input" id="ac-${t.id}" placeholder="Reading text / questions / writing prompt…">${esc(t.activity_content||'')}</textarea>
      </div>
      <div class="field-row">
        <div class="field-label">Gate</div>
        <select class="field-input" id="ag-${t.id}" style="max-width:180px">
          <option value="">— No gate —</option>
          <option value="morning"${t.gate_session==='morning'?' selected':''}>Morning</option>
          <option value="recess"${t.gate_session==='recess'?' selected':''}>Recess</option>
          <option value="lunch"${t.gate_session==='lunch'?' selected':''}>Lunch</option>
        </select>
      </div>
      <div style="display:flex;gap:7px;margin-top:8px">
        <button class="btn btn-p btn-sm" onclick="saveTask(${t.id})" style="flex:1">💾 Save task</button>
        <button class="btn btn-sm" style="background:${t.done?'#dcfce7':'#f3f4f6'};color:${t.done?'#16a34a':'#6b7280'}" onclick="toggleDone(${t.id})">${t.done?'✓ Done':'Mark done'}</button>
      </div>
    `;
    c.appendChild(div);
  });
}

function renderMoods(log) {
  const c = document.getElementById('mood-area');
  if (!log.length) { c.innerHTML = '<div style="color:#9ca3af;font-size:13px;font-weight:600">No check-ins today yet.</div>'; return; }
  c.innerHTML = '';
  log.forEach(e => {
    const t = new Date(e.logged_at).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'mood-row';
    div.innerHTML = `<div style="font-size:22px">${e.mood_emoji}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:800;color:${e.is_alert?'#dc2626':'#1a1a2e'}">${e.mood_label}${e.is_alert?' ⚠️':''}</div>
      <div style="font-size:11px;color:#6b7280;font-weight:600">${t}</div></div>
      <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;background:${e.is_alert?'#fee2e2':'#dcfce7'};color:${e.is_alert?'#dc2626':'#16a34a'}">${e.is_alert?'Alert':'OK'}</span>`;
    c.appendChild(div);
  });
}

function renderWriting() {
  const c = document.getElementById('writing-area');
  const written = tasks.filter(t => t.saved_writing);
  if (!written.length) { c.innerHTML = '<div style="color:#9ca3af;font-size:13px;font-weight:600">No writing submitted yet.</div>'; return; }
  c.innerHTML = '';
  written.forEach(t => {
    const words = (t.saved_writing||'').split(/\s+/).filter(w=>w).length;
    const div = document.createElement('div');
    div.className = 'writing-box';
    div.innerHTML = `<div style="font-size:12px;font-weight:800;margin-bottom:2px">${esc(t.name)}</div>
      <div style="font-size:10px;color:#6b7280;font-weight:600;margin-bottom:7px">${t.writing_submitted_at||''} · ${words} words</div>
      <div style="font-size:13px;line-height:1.6;white-space:pre-wrap">${esc(t.saved_writing||'')}</div>`;
    c.appendChild(div);
  });
}

// ── SAVE ──────────────────────────────────────────────────
function flushFields() {
  tasks.filter(t => t.day_index === day).forEach(t => {
    const g = id => document.getElementById(id+'-'+t.id);
    if(g('an')) t.name = g('an').value;
    if(g('am')) t.meta = g('am').value;
    if(g('as')) t.subject = g('as').value;
    if(g('ax')) t.xp = parseInt(g('ax').value)||20;
    if(g('ast')) t.steps = parseInt(g('ast').value)||3;
    if(g('al')) t.link = g('al').value.trim();
    if(g('ag')) t.gate_session = g('ag').value||'';
    if(g('ac')) t.activity_content = g('ac').value||'';
  });
}

async function saveXP() {
  const xp = parseInt(document.getElementById('xp-input').value)||0;
  const {error} = await db.from('quest_state').update({xp, updated_at:new Date()}).eq('id','tom');
  if (error) { toast('Error: '+error.message); return; }
  toast('XP saved! ⭐');
}

async function saveTask(id) {
  const g = field => { const el = document.getElementById(field+'-'+id); return el ? el.value : ''; };
  const updates = {
    name: g('an'), meta: g('am'), subject: g('as'),
    xp: parseInt(g('ax'))||20, steps: parseInt(g('ast'))||3,
    gate_session: g('ag'), link: g('al'),
    activity_content: g('ac'), updated_at: new Date(),
  };
  const {error} = await db.from('tasks').update(updates).eq('id', id);
  if (error) { toast('Error: '+error.message); return; }
  const t = tasks.find(x => x.id === id);
  if (t) Object.assign(t, updates);
  toast('Saved ✓');
}

async function addTask() {
  flushFields();
  const subj = document.getElementById('new-subj').value;
  const nameEl = document.getElementById('new-name');
  const name = nameEl.value.trim() || subj + ' task';
  const {data, error} = await db.from('tasks').insert({
    student_id:'tom', day_index:day, subject:subj, name,
    meta: META_DEF[subj]||'Complete task', xp: XP_DEF[subj]||20,
    steps:3, progress:0, done:false, link:'', gate_session:'',
    unlocks_games:'[]', activity_content:'', min_words:30,
  }).select().single();
  if (error) { toast('Error: '+error.message); return; }
  tasks.push(data);
  nameEl.value = '';
  renderTasks();
  toast(subj + ' task added!');
}

async function delTask(id) {
  if (!confirm('Delete this task?')) return;
  flushFields();
  const {error} = await db.from('tasks').delete().eq('id', id);
  if (error) { toast('Error: '+error.message); return; }
  tasks = tasks.filter(t => t.id !== id);
  renderTasks();
  toast('Deleted');
}

async function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const done = !t.done;
  const {error} = await db.from('tasks').update({done, progress: done?t.steps:0, updated_at:new Date()}).eq('id', id);
  if (error) { toast('Error: '+error.message); return; }
  t.done = done; t.progress = done ? t.steps : 0;
  renderTasks();
  toast(done ? 'Marked done ✓' : 'Marked incomplete');
}

async function resetDay() {
  if (!confirm('Reset all task progress for ' + DAYS[day] + '?')) return;
  flushFields();
  const ids = tasks.filter(t => t.day_index === day).map(t => t.id);
  if (!ids.length) { toast('No tasks to reset'); return; }
  const {error} = await db.from('tasks').update({progress:0, done:false, updated_at:new Date()}).in('id', ids);
  if (error) { toast('Error: '+error.message); return; }
  tasks.forEach(t => { if (t.day_index === day) { t.progress=0; t.done=false; } });
  renderTasks();
  toast('Day reset ✓');
}

// ── HELPERS ───────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function setStatus(ok, text, sub) {
  document.getElementById('status-dot').className = 'status-dot ' + (ok?'dot-ok':'dot-err');
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-sub').textContent = sub||'';
}
</script>
</body>
</html>
